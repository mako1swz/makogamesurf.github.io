<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet candy site</title>
    <link rel="icon" type="image/png" href="img/catsaregreat_114.png">

    
    <style>
        :root {
            --cs-bg: #1b1b1b;
            --cs-panel: #2a2a2a;
            --cs-accent: #ff4d4d; /* красный как в HUD */
            --cs-text: #e0e0e0;
            --cs-border: #444;
            --font-ui: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--cs-bg);
            color: var(--cs-text);
            font-family: var(--font-ui);
            margin: 0;
            padding: 10px;
        }

        /* Панель-рамка как HUD панель */
        .hud-panel {
            background: var(--cs-panel);
            border: 1px solid var(--cs-border);
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            max-width: 800px;
            margin: 20px auto;
        }

        h1, h3 {
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            border-bottom: 2px solid var(--cs-accent);
            display: inline-block;
            margin-bottom: 10px;
        }

        p, li {
            line-height: 1.5;
        }

        a {
            color: var(--cs-accent);
            text-decoration: none;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        a:hover {
            color: #ff8a8a;
            text-decoration: underline;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            margin: 8px 0;
            padding-left: 16px;
            position: relative;
        }

        /* «Прицел» как маркер списка */
        li::before {
            content: "+";
            position: absolute;
            left: 0;
            color: var(--cs-accent);
            font-size: 14px;
            line-height: 20px;
        }

        img {
            max-width: 100%;
            border: 2px solid #333;
            filter: contrast(1.1) brightness(0.95);
            margin-top: 15px;
            display: block;
        }

        nav {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #444;
        }

        .signature {
            margin-top: 30px;
            font-size: 0.9em;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="hud-panel">
        <h1>Sweet candy site</h1>
        <p><b>Test site</b></p>
        <h3>by sweet candy</h3>

        <ul>
            <li><a href="https://forum.sibgamer.com/">Форум SIBGamer</a></li>
            <li><a href="https://mako1swz.github.io/">Мой кликер</a></li>
        </ul>

        <p>Мой telegram @M1k0Ni</p>
        <p>Крутой музика: <a href="https://music.yandex.ru/artist/6767066">music.yandex.ru</a></p>

        <img src="">

        <nav>
            <!-- сюда можно добавить ссылки меню -->
        </nav>

        <div class="signature">
            Sweet candy style edition
        </div>
    </div>
</body>
</html>
