<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Subway Runner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #1a1a1a);
      --text: var(--tg-theme-text-color, #ffffff);
      --accent: var(--tg-theme-button-color, #ff4757);
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      margin: 0;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      image-rendering: pixelated; /* чтобы не размывалось при скейле */
    }

    /* UI поверх канваса */
    #ui-layer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
      box-sizing: border-box;
    }

    .score-board {
      font-size: clamp(16px, 4vw, 24px);
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      background: rgba(0,0,0,0.4);
      padding: 6px 12px;
      border-radius: 8px;
    }

    /* Экраны поверх всего */
    #start-screen, #game-over-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      text-align: center;
      z-index: 10;
    }

    h2 {
      font-size: clamp(20px, 5vw, 32px);
      margin: 0 0 8px 0;
    }

    p {
      font-size: clamp(14px, 3.5vw, 18px);
      margin: 0 0 20px 0;
      color: rgba(255,255,255,0.8);
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: clamp(12px, 4vw, 20px) clamp(20px, 6vw, 30px);
      font-size: clamp(16px, 4vw, 20px);
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      min-width: 140px;
    }

    button:active {
      transform: scale(0.96);
    }

    /* Зоны управления тапом (слева/справа) */
    .tap-zone {
      position: absolute;
      bottom: 0;
      width: calc(50% - 10px);
      height: 160px;
      z-index: 5;
      opacity: 0.1; /* почти невидимо, но кликабельно */
      user-select: none;
    }
    .tap-left { left: 0; }
    .tap-right { right: 0; }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- UI -->
    <div id="ui-layer">
      <div class="score-board">Счёт: <span id="scoreEl">0</span></div>
    </div>

    <!-- Зоны тапа (управление) -->
    <div class="tap-zone tap-left" id="zoneLeft"></div>
    <div class="tap-zone tap-right" id="zoneRight"></div>

    <!-- Экран старта -->
    <div id="start-screen">
      <h2>Subway Runner</h2>
      <p>Тапай слева/справа или свайпай, чтобы уклоняться</p>
      <button id="btnStart">Начать</button>
    </div>

    <!-- Экран Game Over -->
    <div id="game-over-screen" style="display:none;">
      <h2>Game Over</h2>
      <p>Счёт: <span id="finalScore">0</span></p>
      <button id="btnRestart">Ещё раз</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('scoreEl');
    const finalScore = document.getElementById('finalScore');
    const btnStart = document.getElementById('btnStart');
    const btnRestart = document.getElementById('btnRestart');
    const startScreen = document.getElementById('start-screen');
    const gameOverScreen = document.getElementById('game-over-screen');

    // Адаптивные размеры
    function resize() {
      // Сохраняем пропорции 16:9, но не больше экрана
      const aspect = 640 / 360;
      let w = window.innerWidth;
      let h = window.innerHeight;

      if (w / h < aspect) {
        h = w / aspect;
      } else {
        w = h * aspect;
      }

      canvas.width = Math.round(w);
      canvas.height = Math.round(h);
    }
    window.addEventListener('resize', resize);
    resize(); // первый раз

    const lanes = 3;
    let laneWidth; // будет пересчитываться при ресайзе

    const playerSizeBase = 40;
    const obstacleSizeBase = 50;

    let playerLane = 1;
    let obstacles = [];
    let frame = 0;
    let speed = 4;
    let score = 0;
    let gameActive = false;
    let animationFrameId;

    function resetGame() {
      playerLane = 1;
      obstacles = [];
      frame = 0;
      speed = 4;
      score = 0;
      scoreEl.textContent = score;
      gameActive = true;
      cancelAnimationFrame(animationFrameId);
      loop();
    }

    function spawnObstacle() {
      const lane = Math.floor(Math.random() * lanes);
      const x = lane * laneWidth + laneWidth/2 - obstacleSize/2;
      const y = -obstacleSize;
      obstacles.push({ x, y, lane });
    }

    function update() {
      if (!gameActive) return;

      frame++;
      if (frame % 60 === 0) speed += 0.2;

      if (frame % (60 - Math.min(20, Math.floor(speed))) === 0) {
        spawnObstacle();
      }

      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].y += speed;
        if (obstacles[i].y > canvas.height) {
          obstacles.splice(i, 1);
          score++;
          scoreEl.textContent = score;
        }
      }

      const playerX = playerLane * laneWidth + laneWidth/2 - playerSize/2;
      const playerY = canvas.height - playerSize - 20;

      for (const o of obstacles) {
        if (
          playerX < o.x + obstacleSize &&
          playerX + playerSize > o.x &&
          playerY < o.y + obstacleSize &&
          playerY + playerSize > o.y
        ) {
          gameOver();
          return;
        }
      }
    }

    function draw() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      laneWidth = canvas.width / lanes;
      const playerSize = playerSizeBase * (canvas.height / 360);
      const obstacleSize = obstacleSizeBase * (canvas.height / 360);

      // Полосы
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 2;
      for (let l = 1; l < lanes; l++) {
        const x = l * laneWidth;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      // Препятствия
      ctx.fillStyle = '#ff4757';
      for (const o of obstacles) {
        ctx.fillRect(o.x, o.y, obstacleSize, obstacleSize);
      }

      // Игрок
      ctx.fillStyle = '#1dd1a1';
      ctx.fillRect(
        playerLane * laneWidth + laneWidth/2 - playerSize/2,
        canvas.height - playerSize - 20,
        playerSize,
        playerSize
      );
    }

    function loop() {
      update();
      draw();
      if (gameActive) {
        animationFrameId = requestAnimationFrame(loop);
      }
    }

    function gameOver() {
      gameActive = false;
      finalScore.textContent = score;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'flex';
    }

    function moveLane(direction) {
      if (!gameActive) return;
      let next = playerLane + direction;
      if (next >= 0 && next < lanes) {
        playerLane = next;
      }
    }

    // Тап по зонам
    document.getElementById('zoneLeft').addEventListener('click', () => moveLane(-1));
    document.getElementById('zoneRight').addEventListener('click', () => moveLane(1));

    // Свайпы
    let touchStartX = 0;
    canvas.addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
    });
    canvas.addEventListener('touchend', e => {
      const touchEndX = e.changedTouches[0].clientX;
      const diff = touchEndX - touchStartX;
      if (diff < -40) moveLane(-1);
      if (diff > 40) moveLane(1);
    });

    // Клавиатура
    document.addEventListener('keydown', e => {
      if (e.key === 'a' || e.key === 'ArrowLeft') moveLane(-1);
      if (e.key === 'd' || e.key === 'ArrowRight') moveLane(1);
    });

    btnStart.addEventListener('click', () => {
      startScreen.style.display = 'none';
      resetGame();
    });
    btnRestart.addEventListener('click', () => {
      gameOverScreen.style.display = 'none';
      resetGame();
    });
  </script>
</body>
</html>
