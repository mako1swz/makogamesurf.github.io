<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Крестики-Нолики TWA</title>
    <!-- Подключение SDK Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --btn: var(--tg-theme-button-color, #2a9df4);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --cell-bg: #f5f5f5;
        }
        [data-theme="dark"] {
            --bg: #1c1c1e;
            --text: #f5f5f5;
            --cell-bg: #2c2c2e;
        }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; min-height: 100vh; transition: all 0.3s ease; }
        h1 { margin-bottom: 5px; text-align: center; }
        .subtitle { text-align: center; opacity: 0.8; margin-bottom: 20px; font-size: 14px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .mode-btn { padding: 8px 16px; background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .mode-btn.active { transform: scale(1.05); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 300px; height: 300px; }
        .cell { background: var(--cell-bg); display: flex; justify-content: center; align-items: center; font-size: 48px; cursor: pointer; user-select: none; border-radius: 8px; transition: background 0.2s; }
        .cell.used { cursor: default; background: #e0e0e0; }
        .cell[data-theme="dark"].used { background: #3a3a3c; }
        .cell:hover:not(.used) { background: #d0d0d0; }
        .cell[data-theme="dark"]:hover:not(.used) { background: #4a4a4c; }

        .stats { text-align: center; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.05); border-radius: 12px; width: 100%; max-width: 320px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; }
        
        .share-link { word-break: break-all; background: var(--cell-bg); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 12px; }
        .copy-btn { margin-left: 10px; padding: 5px 8px; font-size: 12px; }
    </style>
</head>
<body>
    <h1 id="gameStatus">Выбери режим игры</h1>
    <div class="subtitle" id="turnInfo"></div>

    <div class="controls">
        <button class="mode-btn active" onclick="startSinglePlayer()">🤖 Игра с ботом</button>
        <button class="mode-btn" onclick="createRoom()">👥 Создать сетевую игру</button>
        <input type="text" id="joinInput" placeholder="Код комнаты..." style="display:none; padding:8px; border-radius:8px; border:1px solid #ccc;">
        <button id="joinBtn" onclick="joinRoom()" style="display:none;">✅ Войти</button>
    </div>

    <div class="board" id="board"></div>
    
    <button id="resetBtn" class="mode-btn" onclick="resetGame()" style="display:none;">Новая игра</button>

    <div class="stats" id="statsPanel">
        <h3>Ваша статистика (Одиночная)</h3>
        <div class="stat-row"><span>Побед:</span><span id="wins">0</span></div>
        <div class="stat-row"><span>Поражений:</span><span id="losses">0</span></div>
        <div class="stat-row"><span>Ничьих:</span><span id="draws">0</span></div>
    </div>

    <div id="networkInfo" style="margin-top:15px; display:none; text-align:center;">
        <p><strong>Код комнаты:</strong> <span id="roomCode"></span></p>
        <div class="share-link">
            Ссылка для друга: <span id="shareUrl"></span>
            <button class="copy-btn" onclick="copyLink()">Копировать</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();

        // Применяем тему TG к телу документа
        if (tg.themeParams && tg.themeParams.bg_color.includes('1c1c1') || getComputedStyle(document.documentElement).getPropertyValue('--bg').includes('1c1c1')) {
             document.body.setAttribute('data-theme', 'dark');
        } else {
             document.body.removeAttribute('data-theme');
        }

        const WIN_COMBINATIONS = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8],
            [0, 3, 6], [1, 4, 7], [2, 5, 8],
            [0, 4, 8], [2, 4, 6]
        ];

        let board = Array(9).fill('');
        let currentPlayer = 'X';
        let gameActive = true;
        let mode = 'single'; // single | host | client
        let opponentIsBot = false;

        // --- СТАТИСТИКА ---
        function loadStats() {
            const stats = JSON.parse(localStorage.getItem('ttt_stats')) || { wins: 0, losses: 0, draws: 0 };
            document.getElementById('wins').textContent = stats.wins;
            document.getElementById('losses').textContent = stats.losses;
            document.getElementById('draws').textContent = stats.draws;
        }
        function saveStats(stats) { localStorage.setItem('ttt_stats', JSON.stringify(stats)); }

        // --- БОТ (AI) ---
        function botMove() {
            setTimeout(() => {
                let bestScore = -Infinity;
                let move;
                for(let i = 0; i < 9; i++){
                    if(board[i] === ''){
                        board[i] = 'O';
                        let score = minimax(board, 0, false);
                        board[i] = '';
                        if(score > bestScore){
                            bestScore = score;
                            move = i;
                        }
                    }
                }
                board[move] = 'O';
                renderBoard();
                checkEndState();
            }, 500); // Задержка для красоты
        }

        function minimax(newBoard, depth, isMaximizing){
            const scores = {'X': -10, 'O': 10, 'draw': 0};
            const result = checkWinnerRaw(newBoard);
            if(result !== null) return scores[result];
            
            if(isMaximizing){
                let best = -Infinity;
                for(let i=0; i<9; i++){ if(newBoard[i]===''){ newBoard[i]='O'; best = Math.max(best, minimax(newBoard, depth+1, false)); newBoard[i]='';} }
                return best;
            } else {
                let best = Infinity;
                for(let i=0; i<9; i++){ if(newBoard[i]===''){ newBoard[i]='X'; best = Math.min(best, minimax(newBoard, depth+1, true)); newBoard[i]='';} }
                return best;
            }
        }

        // --- ЛОГИКА ПОЛЯ ---
        function renderBoard(){
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board.forEach((value, index) => {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                if(value) cell.classList.add('used');
                cell.textContent = value;
                if(!value && gameActive) cell.onclick = () => handleCellClick(index);
                boardEl.appendChild(cell);
            });
        }

        async function handleCellClick(index){
            if(!gameActive || board[index] !== '' || (currentPlayer !== 'X' && !opponentIsBot)) return;
            
            board[index] = currentPlayer;
            renderBoard();
            
            // В сетевой игре отправляем ход оппоненту через WebAppData
            if(mode === 'host'){
                await tg.sendData(JSON.stringify({type:'move', idx:index, player:'X'}));
            }

            const winner = checkWinner();
            if(winner || isDraw()) { checkEndState(); return; }

            currentPlayer = 'O';
            updateTurnInfo();

            if(opponentIsBot){
                botMove();
            } else if(mode === 'host'){
                currentPlayer = 'O'; // Ждем хода клиента
            }
        }

        function checkWinner(){
            for(let comb of WIN_COMBINATIONS){
                const [a,b,c] = comb;
                if(board[a] && board[a]===board[b] && board[a]===board[c]) return board[a];
            }
            return null;
        }
        function checkWinnerRaw(b){ for(let c of WIN_COMBINATIONS){ const [a,b1,d]=c; if(b[a]&&b[a]===b[b1]&&b[a]===b[d]) return b[a];} return null;}
        function isDraw(){ return board.every(cell => cell !== '') && !checkWinner(); }

        function checkEndState(){
            gameActive = false;
            const winner = checkWinner();
            if(winner){
                document.getElementById('gameStatus').textContent = `Игрок ${winner} победил!`;
                if(mode === 'single'){
                    let stats = JSON.parse(localStorage.getItem('ttt_stats'));
                    if(winner === 'X') stats.wins++; else stats.losses++;
                    saveStats(stats); loadStats();
                }
                tg.sendData(JSON.stringify({status:'end', winner: winner}));
            } else {
                document.getElementById('gameStatus').textContent = "Ничья!";
                if(mode === 'single'){
                    let stats = JSON.parse(localStorage.getItem('ttt_stats')); stats.draws++; saveStats(stats); loadStats();
                }
                tg.sendData(JSON.stringify({status:'end', winner: 'draw'}));
            }
        }

        function resetGame(){
            board = Array(9).fill('');
            currentPlayer = 'X';
            gameActive = true;
            document.getElementById('gameStatus').textContent = opponentIsBot ? "Ваш ход (X)" : "Ожидание хода...";
            document.getElementById('resetBtn').style.display = 'none';
            renderBoard();
            updateTurnInfo();
        }

        function updateTurnInfo(){
            if(gameActive){
                if(opponentIsBot){
                    document.getElementById('turnInfo').textContent = currentPlayer === 'X' ? "Ваш ход" : "Ход бота...";
                } else {
                    document.getElementById('turnInfo').textContent = mode === 'host' ? (currentPlayer === 'X' ? "Ваш ход" : "Ход соперника") : (currentPlayer === 'X' ? "Ход соперника" : "Ваш ход");
                }
            }
        }

        // --- РЕЖИМЫ ---
        function startSinglePlayer(){
            mode = 'single'; opponentIsBot = true;
            setupUIForMode();
            resetGame();
        }

        function createRoom(){
            mode = 'host'; opponentIsBot = false;
            const roomId = Math.random().toString(36).substring(2, 8).toUpperCase();
            window.history.pushState({}, '', `?room=${roomId}&player=X`);
            document.getElementById('roomCode').textContent = roomId;
            document.getElementById('shareUrl').textContent = window.location.href;
            setupUIForMode();
            resetGame();
        }

        function joinRoom(){
            const code = document.getElementById('joinInput').value.trim().toUpperCase();
            if(code.length >= 4){
                mode = 'client'; opponentIsBot = false;
                window.history.pushState({}, '', `?room=${code}&player=O`);
                document.getElementById('roomCode').textContent = code;
                setupUIForMode();
                resetGame();
            }
        }

        function setupUIForMode(){
            document.querySelector('.controls').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'block';
            document.getElementById('networkInfo').style.display = (mode === 'host' || mode === 'client') ? 'block' : 'none';
            document.getElementById('statsPanel').style.display = (mode === 'single') ? 'block' : 'none';
            if(mode === 'host') document.getElementById('gameStatus').textContent = "Комната создана! Ожидание игрока...";
            if(mode === 'client') document.getElementById('gameStatus').textContent = "Вы вошли в комнату. Ожидание начала...";
        }

        function copyLink(){
            navigator.clipboard.writeText(window.location.href);
            alert("Ссылка скопирована!");
        }

        // --- ОБРАБОТЧИК ДАННЫХ ОТ ТГ И ОПпонЕНТА ---
        tg.MainButton.onClick(() => {}); // На всякий случай заглушка

        // Получение данных от JS (наш собственный sendData)
        window.Telegram.WebApp.onEvent('data', async e => {
            const data = JSON.parse(e.data);
            if(data.type === 'move'){
                board[data.idx] = data.player;
                renderBoard();
                if(checkWinner() || isDraw()) { checkEndState(); return; }
                currentPlayer = data.player === 'X' ? 'O' : 'X';
                updateTurnInfo();
            }
            if(data.status === 'end'){
                checkEndState();
            }
        });

        // --- ЗАПУСК ---
        // Парсинг URL для входа в сеть
        const params = new URLSearchParams(window.location.search);
        if(params.has('room')){
            const room = params.get('room');
            const player = params.get('player');
            document.getElementById('roomCode').textContent = room;
            mode = player === 'X' ? 'host' : 'client';
            opponentIsBot = false;
            setupUIForMode();
            if(mode === 'client') document.getElementById('gameStatus').textContent = "Присоединено к комнате " + room;
        } else {
            loadStats();
        }
    </script>
</body>
</html>
